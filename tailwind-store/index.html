<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tailwind Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50">
    <header class="max-w-6xl mx-auto p-6 flex items-center justify-between">
      <h1 class="text-2xl font-bold text-gray-800">Shop</h1>
      <div class="flex items-center gap-4">
        <input placeholder="Search products" class="px-3 py-2 rounded border" />
        <button class="px-3 py-2 bg-indigo-600 text-white rounded">Cart</button>
      </div>
    </header>

    <main class="max-w-6xl mx-auto p-6 grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <article class="bg-white rounded-xl p-4 shadow">
        <img src="https://images.unsplash.com/photo-1526178615613-8b3b1f0f4e91?auto=format&fit=crop&w=600&q=60" class="w-full h-48 object-cover rounded" />
        <h3 class="mt-2 font-semibold">Product A</h3>
        <p class="text-gray-500">$29</p>
      </article>
      <article class="bg-white rounded-xl p-4 shadow">
        <img src="https://images.unsplash.com/photo-1513708928675-1bb4b2a8b6f2?auto=format&fit=crop&w=600&q=60" class="w-full h-48 object-cover rounded" />
        <h3 class="mt-2 font-semibold">Product B</h3>
        <p class="text-gray-500">$49</p>
      </article>
    </main>
  </body>
</html>
